apiVersion: v1
kind: PersistentVolume
metadata:
  name: efs-static
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: "" #should be empty in static provisioning
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-0f0b470964d5cef7b

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-claim
spec:
  accessModes:
    - ReadWriteOnce # Must match the PV's access mode
  #storageClassName: "" # Must match the PV's storageClassName
  volumeName: efs-static # This binds it directly to the reset PV
  resources:
    requests:
      storage: 2Gi # Must be less than or equal to the PV's capacity

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    name: roboshop
    server: lb-nginx-frontend
    env: dev
spec:
  # nodeSelector:
  #   topology.kubernetes.io/zone: us-east-1c # because it was efc irrespective of location it will attach
  containers:
    - name: nginx
      image: nginx:latest
      volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: efs-static
  volumes:
    - name: efs-static
      persistentVolumeClaim:
        claimName: efs-claim

---

apiVersion: v1
kind: Service
metadata:
  name: lb-port-demo
  labels:
    name: roboshop
    server: lb-nginx-frontend
    env: dev
spec:
  type: LoadBalancer
  selector:
    name: roboshop
    server: lb-nginx-frontend
    env: dev
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80 