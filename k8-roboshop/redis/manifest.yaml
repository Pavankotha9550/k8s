apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  labels:
    name: deployment-redis
    project: roboshop
spec:
  replicas: 1
  selector:
    matchLabels:
      name: deployment-redis
      project: roboshop
  template:
    metadata:
      labels:
        name: deployment-redis
        project: roboshop
    spec:
      containers:
      - name: redis
        image: redis:7.0

