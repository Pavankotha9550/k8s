apiVersion: v1
kind: ConfigMap
metadata:
  name: configmap-shipping
  labels:
    name: configmap-shipping
    project: roboshop
data:
  # property-like keys; each key maps to a simple value
  CART_ENDPOINT: "service-cart:8080"
  DB_HOST: "service-mysql"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop
  labels:
    name: deployment-shipping
    project: roboshop
spec:
  replicas: 1
  selector:
    matchLabels:
      name: deployment-shipping
      project: roboshop
  template:
    metadata:
      labels:
        name: deployment-shipping
        project: roboshop
    spec:
      containers:
      - name: catalogue
        image: pavankotha9550/shipping:v1
        envFrom:
        - configMapRef:
            name: configmap-shipping
---
apiVersion: v1
kind: Service
metadata:
  name: service-shipping
  namespace: roboshop
  labels:
    name: roboshop
    server: service-shipping
    env: dev
spec:
  selector:
    name: deployment-shipping
    project: roboshop
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
